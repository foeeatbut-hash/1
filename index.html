<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flux</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%230d9488'/%3E%3Cstop offset='1' stop-color='%234ade80'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='24' fill='url(%23g)'/%3E%3Cg fill='none' stroke='white' stroke-width='9' stroke-linecap='round'%3E%3Cpath d='M28 66 C42 40 58 40 72 66'/%3E%3Cpath d='M28 44 C42 70 58 70 72 44'/%3E%3C/g%3E%3C/svg%3E" />
    <style>
      html, body { margin: 0; background: #0f172a; }
      /* ── Стартовая заставка Flux ──
         Живёт ВНЕ #root: React её не пересоздаёт, поэтому интро идёт одной
         непрерывной анимацией от первой отрисовки страницы до готовности
         сервера (прогресс ведёт инлайн-скрипт ниже, гасит — ServerGate).
         Если скрипт упадёт — пользователь увидит её вместо немого экрана. */
      #boot-splash {
        position: fixed; inset: 0; overflow: hidden; z-index: 50;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: #0f172a; color: #94a3b8;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
      }
      /* Чертёжная сетка (blueprint), растворяющаяся к краям */
      #boot-splash::before {
        content: ''; position: absolute; inset: 0;
        background-image:
          linear-gradient(rgba(148,163,184,0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(148,163,184,0.05) 1px, transparent 1px);
        background-size: 44px 44px;
        -webkit-mask-image: radial-gradient(circle at 50% 44%, black, transparent 74%);
        mask-image: radial-gradient(circle at 50% 44%, black, transparent 74%);
      }
      #boot-splash .glow {
        position: absolute; width: 520px; height: 520px; border-radius: 50%;
        background: radial-gradient(circle, rgba(16,185,129,0.14), transparent 65%);
        animation: fx-breathe 3.6s ease-in-out infinite;
      }
      #boot-splash .orb {
        position: absolute; border-radius: 50%; filter: blur(26px);
        background: rgba(16,185,129,0.12); pointer-events: none;
      }
      #boot-splash .orb.o1 { width: 130px; height: 130px; left: 16%; top: 66%; animation: fx-float 9s ease-in-out infinite; }
      #boot-splash .orb.o2 { width: 90px;  height: 90px;  left: 74%; top: 22%; animation: fx-float 11s ease-in-out -3s infinite; }
      #boot-splash .orb.o3 { width: 70px;  height: 70px;  left: 62%; top: 74%; animation: fx-float 8s ease-in-out -6s infinite; }
      /* Воздушные потоки, проплывающие через экран */
      #boot-splash .stream {
        position: absolute; left: 0; height: 2px; width: 260px; border-radius: 99px;
        background: linear-gradient(90deg, transparent, rgba(74,222,128,0.22), transparent);
        pointer-events: none;
      }
      #boot-splash .stream.s1 { top: 22%; animation: fx-stream 7.5s linear infinite; }
      #boot-splash .stream.s2 { top: 50%; width: 340px; animation: fx-stream 10s linear -4s infinite; }
      #boot-splash .stream.s3 { top: 79%; animation: fx-stream 8.5s linear -2s infinite; }
      /* Логотип с вращающимся ореолом */
      #boot-splash .tile-wrap { position: relative; display: flex; align-items: center; justify-content: center; }
      #boot-splash .halo {
        position: absolute; width: 158px; height: 158px; border-radius: 50%;
        background: conic-gradient(from 0deg, transparent 60%, rgba(52,211,153,0.38) 82%, transparent 100%);
        filter: blur(10px); animation: fx-spin 5s linear infinite;
      }
      #boot-splash .tile {
        position: relative; width: 92px; height: 92px; border-radius: 22px;
        background: linear-gradient(140deg, #0d9488, #10b981, #4ade80);
        display: flex; align-items: center; justify-content: center;
        animation:
          fx-pop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both,
          fx-glow 3s ease-in-out 0.7s infinite,
          fx-hover 5s ease-in-out 1.2s infinite;
      }
      #boot-splash .flux-curve { fill: none; stroke: #fff; stroke-width: 9; stroke-linecap: round; }
      /* Кривые сначала рисуются штрихом… */
      #boot-splash .flux-base  { opacity: 0.32; stroke-dasharray: 100 100; animation: fx-draw 1s ease-out 0.25s both; }
      /* …а затем по ним начинают течь «потоки воздуха» */
      #boot-splash .flux-comet {
        stroke-dasharray: 30 70; opacity: 0;
        animation: fx-flow 2.4s linear infinite, fx-in 0.5s ease 1.15s forwards;
      }
      #boot-splash .flux-comet.rev { animation: fx-flow-rev 2.4s linear -1.2s infinite, fx-in 0.5s ease 1.15s forwards; }
      /* Надпись с периодическим бликом */
      #boot-splash .wordmark {
        margin-top: 22px; font-size: 26px; font-weight: 800;
        background: linear-gradient(100deg, #e2e8f0 40%, #86efac 50%, #e2e8f0 60%);
        background-size: 250% 100%; background-position: 120% 0;
        -webkit-background-clip: text; background-clip: text; color: transparent;
        animation:
          fx-letters 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.25s both,
          fx-shine 3.8s ease-in-out 1.8s infinite;
      }
      #boot-splash .subtitle {
        margin-top: 6px; font-size: 12px; color: #64748b; letter-spacing: 0.4px;
        animation: fx-fade 0.8s ease 0.7s both;
      }
      /* Полоса загрузки: настоящее заполнение + бегущий шиммер поверх */
      #boot-splash .bar-row {
        margin-top: 26px; display: flex; align-items: center; gap: 10px;
        animation: fx-fade 0.8s ease 0.9s both;
      }
      #boot-splash .bar {
        width: 180px; height: 3px; border-radius: 99px;
        background: #1e293b; overflow: hidden; position: relative;
      }
      #boot-splash .bar .fill {
        display: block; height: 100%; width: 10%; border-radius: 99px;
        background: linear-gradient(90deg, #10b981, #4ade80);
        transition: width 0.8s ease;
      }
      #boot-splash .bar::after {
        content: ''; position: absolute; top: 0; left: 0; width: 40%; height: 100%;
        border-radius: 99px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
        animation: fx-shimmer 1.4s ease-in-out infinite;
      }
      #boot-splash .pct { width: 34px; font-size: 11px; color: #64748b; font-variant-numeric: tabular-nums; }
      #boot-splash .status { margin-top: 12px; font-size: 12px; color: #64748b; animation: fx-fade 0.8s ease 1s both; }
      #boot-splash .credit {
        position: absolute; bottom: 22px; font-size: 11px; color: #475569;
        animation: fx-fade 1.2s ease 1.4s both;
      }
      @keyframes fx-pop     { from { transform: scale(0.55); opacity: 0; } to { transform: scale(1); opacity: 1; } }
      @keyframes fx-glow    { 0%, 100% { box-shadow: 0 8px 34px rgba(16,185,129,0.28); } 50% { box-shadow: 0 8px 52px rgba(16,185,129,0.5); } }
      @keyframes fx-hover   { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
      @keyframes fx-draw    { from { stroke-dashoffset: 100; } to { stroke-dashoffset: 0; } }
      @keyframes fx-in      { to { opacity: 1; } }
      @keyframes fx-flow    { to { stroke-dashoffset: -100; } }
      @keyframes fx-flow-rev{ to { stroke-dashoffset: 100; } }
      @keyframes fx-letters { from { letter-spacing: 10px; opacity: 0; } to { letter-spacing: 2px; opacity: 1; } }
      @keyframes fx-shine   { 0% { background-position: 120% 0; } 45%, 100% { background-position: -60% 0; } }
      @keyframes fx-fade    { from { opacity: 0; } to { opacity: 1; } }
      @keyframes fx-shimmer { 0% { left: -40%; } 100% { left: 100%; } }
      @keyframes fx-breathe { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.12); opacity: 1; } }
      @keyframes fx-float   { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-34px); } }
      @keyframes fx-stream  { from { transform: translateX(-360px); } to { transform: translateX(calc(100vw + 360px)); } }
      @keyframes fx-spin    { to { transform: rotate(360deg); } }
      /* Готово: вспышка логотипа + плавное растворение (класс ставит __bootSplashDone) */
      #boot-splash.done { animation: fx-out 0.55s ease forwards; pointer-events: none; }
      #boot-splash.done .tile { animation: fx-flash 0.55s ease forwards; }
      @keyframes fx-out   { to { opacity: 0; transform: scale(1.04); } }
      @keyframes fx-flash { to { transform: scale(1.18); box-shadow: 0 0 90px rgba(74,222,128,0.85); } }
    </style>
  </head>
  <body>
    <!-- Заставка — сиблинг #root, а не его содержимое: React при монтировании
         её не трогает, интро не перезапускается и не прыгает -->
    <div id="boot-splash">
      <div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div>
      <div class="stream s1"></div><div class="stream s2"></div><div class="stream s3"></div>
      <div class="glow"></div>
      <div class="tile-wrap">
        <div class="halo"></div>
        <div class="tile">
          <svg width="58" height="58" viewBox="0 0 100 100">
            <path class="flux-curve flux-base" pathLength="100" d="M16 62 C36 28 64 28 84 62" />
            <path class="flux-curve flux-base" pathLength="100" d="M16 40 C36 74 64 74 84 40" />
            <path class="flux-curve flux-comet" pathLength="100" d="M16 62 C36 28 64 28 84 62" />
            <path class="flux-curve flux-comet rev" pathLength="100" d="M16 40 C36 74 64 74 84 40" />
          </svg>
        </div>
      </div>
      <div class="wordmark">Flux</div>
      <div class="subtitle">Инженерный документооборот</div>
      <div class="bar-row">
        <div class="bar"><span class="fill"></span></div>
        <span class="pct"></span>
      </div>
      <div class="status">Загрузка интерфейса…</div>
      <div class="credit">Разработка Раупова Хусрава</div>
    </div>
    <script>
      // Ведёт прогресс/статусы заставки с ПЕРВОЙ отрисовки страницы — ещё до
      // загрузки React-бандла. Гасится вызовом window.__bootSplashDone(instant)
      // из ServerGate, когда встроенный сервер ответил на /api/health.
      (function () {
        var splash = document.getElementById('boot-splash');
        if (!splash) return;
        var fill = splash.querySelector('.fill');
        var pctEl = splash.querySelector('.pct');
        var statusEl = splash.querySelector('.status');
        // Этапы запуска: реального прогресса нет (порт молчит, пока всё не
        // готово), поэтому статусы сменяются по прошедшему времени.
        // При настроенном сервере компании (flux_server_url) — свои тексты.
        var remote = '';
        try { remote = (localStorage.getItem('flux_server_url') || '').trim(); } catch (e) {}
        var STAGES = remote ? [
          [0,  'Подключение к серверу компании…'],
          [4,  'Ожидание ответа: ' + remote],
          [12, 'Сервер отвечает дольше обычного…']
        ] : [
          [0,  'Загрузка интерфейса…'],
          [2,  'Запуск встроенного сервера…'],
          [5,  'Подключение к базе данных…'],
          [10, 'Проверка и обновление структуры данных…'],
          [22, 'Подготовка рабочего пространства…'],
          [40, 'Почти готово, ещё немного…']
        ];
        var startAt = Date.now();
        function tick() {
          var s = (Date.now() - startAt) / 1000;
          // Плавная асимптота: быстро в начале, медленнее к концу, 100% при готовности
          var pct = Math.min(96, Math.round(100 * (1 - Math.exp(-s / 15))));
          if (fill) fill.style.width = Math.max(10, pct) + '%';
          if (pctEl) pctEl.textContent = pct + '%';
          var text = STAGES[0][1];
          for (var i = 0; i < STAGES.length; i++) { if (s >= STAGES[i][0]) text = STAGES[i][1]; }
          if (statusEl) statusEl.textContent = String(text);
        }
        var timer = setInterval(tick, 400);
        tick();
        window.__bootSplashDone = function (instant) {
          if (!splash) return;
          clearInterval(timer);
          var el = splash;
          splash = null;
          if (instant) { el.remove(); return; } // сервер уже был готов — без задержки и мигания
          if (fill) fill.style.width = '100%';
          if (pctEl) pctEl.textContent = '100%';
          el.classList.add('done'); // вспышка логотипа + растворение (CSS)
          setTimeout(function () { el.remove(); }, 600);
        };
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
