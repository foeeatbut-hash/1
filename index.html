<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flux</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%232563eb'/%3E%3Cstop offset='1' stop-color='%2306b6d4'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='24' fill='url(%23g)'/%3E%3Cg fill='none' stroke='white' stroke-width='9' stroke-linecap='round'%3E%3Cpath d='M28 66 C42 40 58 40 72 66'/%3E%3Cpath d='M28 44 C42 70 58 70 72 44'/%3E%3C/g%3E%3C/svg%3E" />
    <style>
      html, body { margin: 0; background: #0f172a; }
      /* Подложка-заставка: видна, пока грузится JS. Если скрипт упадет —
         пользователь увидит её вместо немого белого экрана. */
      #boot-splash {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 16px;
        background: #0f172a; color: #94a3b8;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
      }
      #boot-splash .ring {
        width: 38px; height: 38px; border-radius: 50%;
        border: 3px solid #1e293b; border-top-color: #06b6d4;
        animation: boot-spin 0.8s linear infinite;
      }
      @keyframes boot-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot-splash">
        <div class="ring"></div>
        <div style="font-weight:700;letter-spacing:1px;color:#cbd5e1">Flux</div>
        <div style="font-size:12px">Загрузка интерфейса…</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
