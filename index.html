<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDM System</title>
    <style>
      html, body { margin: 0; background: #0f172a; }
      /* Подложка-заставка: видна, пока грузится JS. Если скрипт упадет —
         пользователь увидит её вместо немого белого экрана. */
      #boot-splash {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 16px;
        background: #0f172a; color: #94a3b8;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
      }
      #boot-splash .ring {
        width: 38px; height: 38px; border-radius: 50%;
        border: 3px solid #1e293b; border-top-color: #10b981;
        animation: boot-spin 0.8s linear infinite;
      }
      @keyframes boot-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot-splash">
        <div class="ring"></div>
        <div style="font-weight:700;letter-spacing:1px;color:#cbd5e1">PDM System</div>
        <div style="font-size:12px">Загрузка интерфейса…</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
